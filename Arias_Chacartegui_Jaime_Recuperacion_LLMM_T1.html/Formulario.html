<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> Formulario de Recuperación HTML </title>
</head>
<body>
    <h2>Formulario de Contacto</h2>
    <form action="#" method="post">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>

        <label for="nombre">Apellido:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="lista desplegable">Curso</label>
        <select id="lista desplegable" name="lista desplegable">
            <option value="1">DAW</option>
            <option value="2">DAM</option>
            <option value="3">ASIR</option>
          
        </select><br><br>
        <label for="Radiobutton">¿Cual es tu lenguaje favorito?</label><br><br>

        <input type="radio" id="html" name="Radiobutton" value="html">
        <label for="html">HTML</label>

        <input type="radio" id="css" name="Radiobutton" value="css">

        <label for="css">CSS</label>

        <input type="radio" id="javascript" name="Radiobutton" value="javascript">

        <label for="javascript">JavaScript</label><br><br>

        <label for="checkbox"><input type="checkbox" name="opcion1" value="valor1">Acepto las Condiciones</label> <br><br>

        <label for="mensaje">Mensaje:</label><br>
        
        <textarea id="mensaje" name="mensaje" cols="40" rows="5">Escribe aqui tu comentario</textarea><br><br>

        <input type="submit" value="Enviar">
        <input type="submit" value="Cancelar">
    </form>
</body>
